name: Build and Push to ACR

on:
    push:
        branches:
            - master

jobs:
    build-and-push:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Azure Login
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: ACR Login
              run: az acr login --name azurecicdlabacr

            - name: Build Docker Image
              run: |
                  docker build -t azurecicdlabacr.azurecr.io/flaskapp:latest .

            - name: Push Docker Image
              run: |
                  docker push azurecicdlabacr.azurecr.io/flaskapp:latest
