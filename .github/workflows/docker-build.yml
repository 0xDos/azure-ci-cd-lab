name: Build and Push to ACR

on:
  push:
    branches:
      - master

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: >
            {
              "clientId":"${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId":"${{ secrets.AZURE_TENANT_ID }}"
            }

      - name: ACR Login
        run: az acr login --name azurecicdlabacr

      - name: Build Docker Image
        run: |
          docker build -t azurecicdlabacr.azurecr.io/flaskapp:latest .

      - name: Push Docker Image
        run: |
          docker push azurecicdlabacr.azurecr.io/flaskapp:latest

      - name: Update Container App
        run: |
          az containerapp update \
            --name flaskapp-prod \
            --resource-group azure-ci-lab \
            --image azurecicdlabacr.azurecr.io/flaskapp:latest
